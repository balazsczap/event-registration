---
format_version: '13'
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git
project_type: react-native
workflows:
  ios-simulator:
    meta:
      bitrise.io:
        stack: osx-xcode-26.4.x
        machine_type_id: g2.mac.large
    description: |
      Installs dependencies.

      Next steps:
      - Add tests to your project and configure the workflow to run them.
      - Check out [Getting started with Expo apps](https://devcenter.bitrise.io/en/getting-started/getting-started-with-expo-apps.html).
    steps:
    - git-clone@8: {}
    - restore-npm-cache@3: {}
    - npm@3:
        title: npm install
        inputs:
        - command: install
    - save-npm-cache@1: {}
    - restore-cocoapods-cache@3: {}
    - script@1:
        title: Expo prebuild
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -e
            set -o pipefail
            set -x
            npx expo prebuild
    - save-cocoapods-cache@1: {}
    - xcode-build-for-simulator@3:
        inputs:
        - configuration: release
        - xcodebuild_options: |-
            CODE_SIGN_IDENTITY=""
            CODE_SIGNING_REQUIRED=NO
            CODE_SIGNING_ALLOWED=NO
        - project_path: ios/EventRegistration.xcworkspace
        - scheme: EventRegistration
    - deploy-to-bitrise-io@2: {}
    triggers:
      push: []
      pull_request: []
  ios-dev-build:
    meta:
      bitrise.io:
        stack: osx-xcode-26.4.x
        machine_type_id: g2.mac.large
    status_report_name: Executing <target_id> for <project_title>
    envs:
    - APP_VARIANT: development
      opts:
        is_expand: false
    steps:
    - git-clone@8: {}
    - restore-npm-cache@3: {}
    - npm@3:
        title: npm install
        inputs:
        - command: install
    - save-npm-cache@1: {}
    - restore-cocoapods-cache@3: {}
    - script@1:
        title: Expo prebuild (dev)
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -e
            set -o pipefail
            set -x
            npx expo prebuild --clean
    - save-cocoapods-cache@1: {}
    - certificate-and-profile-installer@1: {}
    - script@1:
        title: Delete Bitrise Cert
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -e
            set -o pipefail
            set -x
            sudo security delete-certificate -c 'Apple Development: Tooling Bot Bitrise'
    - xcode-archive@6:
        inputs:
        - project_path: ios/EventRegistration.xcworkspace
        - scheme: EventRegistration
        - configuration: Release
        - verbose_log: 'yes'
        - distribution_method: ad-hoc
        - automatic_code_signing: api-key
    - deploy-to-bitrise-io@2: {}
    triggers:
      push: []
app:
  envs:
  - PLATFORM: all
    opts:
      is_expand: false
